{{ $page := .Page }}
{{ with $page.Params.download_files }}
<div class="bg-amber-50 border border-amber-200 rounded-lg p-5 my-6 not-prose">
  <h4 class="font-semibold text-stone-900 mb-3">Download Files</h4>
  <div class="space-y-2">
    {{ range . }}
    <a href="{{ . }}" class="download-link flex items-center gap-2 text-sm text-amber-800 hover:text-amber-900 font-medium py-2 px-3 bg-white rounded-md hover:bg-amber-100 transition-colors" download>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      {{ path.Base . }}
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
