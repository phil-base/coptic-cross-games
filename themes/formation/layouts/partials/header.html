<header class="border-b border-stone-200 bg-white">
  <nav class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="{{ .Site.BaseURL }}" class="text-xl font-semibold text-stone-900 tracking-tight hover:text-amber-800 transition-colors">
      {{ .Site.Title }}
    </a>
    <button id="menu-toggle" class="md:hidden p-2 text-stone-600" aria-label="Toggle menu">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <ul id="nav-menu" class="hidden md:flex items-center gap-8 text-sm font-medium text-stone-600">
      {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" class="hover:text-amber-800 transition-colors">{{ .Name }}</a>
        </li>
      {{ end }}
    </ul>
  </nav>
  <ul id="mobile-menu" class="hidden px-6 pb-4 space-y-3 text-sm font-medium text-stone-600 md:hidden">
    {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}" class="block hover:text-amber-800 transition-colors">{{ .Name }}</a>
      </li>
    {{ end }}
  </ul>
  <script>
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });
  </script>
</header>
