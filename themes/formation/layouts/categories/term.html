{{ define "main" }}
<section class="max-w-5xl mx-auto px-6 py-16">
  <nav class="text-sm text-stone-500 mb-8">
    <a href="/" class="hover:text-amber-800">Home</a>
    <span class="mx-2">/</span>
    <a href="/categories/" class="hover:text-amber-800">Categories</a>
    <span class="mx-2">/</span>
    <span class="text-stone-700">{{ .Title }}</span>
  </nav>
  <h1 class="text-3xl font-bold text-stone-900 mb-3">{{ .Title }}</h1>
  <p class="text-stone-600 mb-10">{{ .Pages.Len }} {{ if eq (.Pages.Len) 1 }}game{{ else }}games{{ end }} in this category.</p>
  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
    {{ range .Pages }}
      {{ partial "game-card.html" . }}
    {{ end }}
  </div>
</section>
{{ end }}
