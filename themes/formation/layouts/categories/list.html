{{ define "main" }}
<section class="max-w-5xl mx-auto px-6 py-16">
  <h1 class="text-3xl font-bold text-stone-900 mb-3">Categories</h1>
  <p class="text-stone-600 mb-10">Browse games by category.</p>
  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
    {{ range .Site.Taxonomies.categories }}
    <a href="{{ .Page.RelPermalink }}" class="block bg-white rounded-lg border border-stone-200 p-6 hover:border-amber-300 hover:shadow-md transition-all text-decoration-none">
      <h3 class="text-lg font-semibold text-stone-900 mb-2">{{ .Page.Title }}</h3>
      <p class="text-sm text-stone-500">{{ .Count }} {{ if eq .Count 1 }}game{{ else }}games{{ end }}</p>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
